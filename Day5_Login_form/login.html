<!DOCTYPE html>
<html>
<head>
<title>Login System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#43e97b,#38f9d7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px;
width:100%;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.logout{
background:red;
}

#msg{
margin-top:10px;
color:red;
}


.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
width:250px;
}

.popup-content button{
background:#007bff;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container" id="loginBox">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>


<div class="container" id="welcomeBox" style="display:none">

<h2 id="welcomeUser"></h2>

<button class="logout" onclick="logout()">Logout</button>

</div>


<div class="popup" id="popup">
<div class="popup-content">
<h3 id="popupText"></h3>
<p>Login Successful </p>

<button onclick="closePopup()">OK</button>

</div>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

let storedUser=localStorage.getItem("username");
let storedPass=localStorage.getItem("password");

if(user===storedUser && pass===storedPass){

document.getElementById("popupText").innerText="Welcome "+user;
document.getElementById("popup").style.display="flex";
document.getElementById("welcomeUser").innerText="Hello "+user;

}else{

document.getElementById("msg").innerText="Invalid Credentials";

}

}

function closePopup(){

document.getElementById("popup").style.display="none";
document.getElementById("loginBox").style.display="none";
document.getElementById("welcomeBox").style.display="block";

}

function logout(){

document.getElementById("welcomeBox").style.display="none";
document.getElementById("loginBox").style.display="block";

}

</script>

</body>
</html>
