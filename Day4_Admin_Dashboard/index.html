<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexStore | Shop & Admin</title>
    <style>
      :root {
        --primary: #6366f1;
        --secondary: #f43f5e;
        --dark: #0f172a;
        --light: #f8fafc;
        --glass: rgba(255, 255, 255, 0.9);
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      * {
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: var(--light);
        color: var(--dark);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar Navigation */
      aside {
        width: 240px;
        background: var(--dark);
        color: white;
        display: flex;
        flex-direction: column;
        padding: 20px;
        z-index: 100;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 40px;
        color: var(--primary);
      }
      .nav-item {
        padding: 12px 15px;
        margin: 4px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #94a3b8;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      .nav-item.active {
        background: var(--primary);
        color: white;
      }

      /* Main Content Wrappers */
      main {
        flex-grow: 1;
        overflow-y: auto;
        position: relative;
      }
      .view {
        display: none;
        padding: 40px;
        animation: fadeIn 0.4s ease;
      }
      .view.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* --- STOREFRONT STYLES --- */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 25px;
      }
      .product-card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: var(--shadow);
        transition: 0.3s;
        border: 1px solid #e2e8f0;
      }
      .product-card:hover {
        transform: translateY(-5px);
      }
      .product-img {
        width: 100%;
        height: 150px;
        background: #f1f5f9;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        margin-bottom: 15px;
      }
      .btn-buy {
        width: 100%;
        padding: 10px;
        background: var(--dark);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 10px;
      }
      .btn-buy:hover {
        background: var(--primary);
      }

      /* --- ADMIN STYLES --- */
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-box {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: var(--shadow);
        border-left: 5px solid var(--primary);
      }
      .admin-table {
        width: 100%;
        background: white;
        border-radius: 12px;
        border-collapse: collapse;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .admin-table th,
      .admin-table td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #f1f5f9;
      }
      .admin-table th {
        background: #f8fafc;
        color: #64748b;
        font-size: 0.8rem;
        text-transform: uppercase;
      }

      /* Floating Add Form */
      .add-form {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-top: 30px;
        max-width: 500px;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
      }

      /* Cart Badge */
      .cart-count {
        background: var(--secondary);
        color: white;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 0.8rem;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <aside>
      <div class="logo">NexStore</div>
      <div class="nav-item active" onclick="showView('shop')">
        🛍️ Storefront
      </div>
      <div class="nav-item" onclick="showView('admin')">🛠️ Admin Panel</div>
      <div class="nav-item">📊 Reports</div>
    </aside>

    <main>
      <section id="shop" class="view active">
        <div class="admin-header">
          <h1>Welcome to NexStore</h1>
          <div style="font-weight: bold">
            Cart: <span id="cart-total">0</span> items
          </div>
        </div>
        <div class="product-grid" id="shop-grid"></div>
      </section>

      <section id="admin" class="view">
        <div class="admin-header">
          <h1>Inventory Dashboard</h1>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <small>Total Products</small>
            <h2 id="total-count">0</h2>
          </div>
          <div class="stat-box" style="border-color: #10b981">
            <small>Inventory Value</small>
            <h2 id="total-value">$0.00</h2>
          </div>
          <div class="stat-box" style="border-color: var(--secondary)">
            <small>Store Status</small>
            <h2>Live</h2>
          </div>
        </div>

        <table class="admin-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="admin-tbody"></tbody>
        </table>

        <div class="add-form">
          <h3>Add New Product</h3>
          <input
            type="text"
            id="p-name"
            placeholder="Name (e.g. Sony Camera)"
          />
          <input type="text" id="p-emoji" placeholder="Emoji Icon (e.g. 📷)" />
          <input type="number" id="p-price" placeholder="Price ($)" />
          <button
            class="btn-buy"
            style="background: var(--primary)"
            onclick="handleCreate()"
          >
            Add to Store
          </button>
        </div>
      </section>
    </main>

    <script>
      let products = [
        {
          id: 1,
          name: "Smart Watch",
          emoji: "⌚",
          price: 199.99,
          cat: "Wearables",
        },
        {
          id: 2,
          name: "Gaming Mouse",
          emoji: "🖱️",
          price: 59.5,
          cat: "PC Accessories",
        },
        { id: 3, name: "Headphones", emoji: "🎧", price: 120.0, cat: "Audio" },
      ];
      let cart = 0;

      function showView(viewId) {
        document
          .querySelectorAll(".view")
          .forEach((v) => v.classList.remove("active"));
        document
          .querySelectorAll(".nav-item")
          .forEach((n) => n.classList.remove("active"));

        document.getElementById(viewId).classList.add("active");
        event.currentTarget.classList.add("active");
        render();
      }

      function render() {
        const shopGrid = document.getElementById("shop-grid");
        shopGrid.innerHTML = products
          .map(
            (p) => `
                <div class="product-card">
                    <div class="product-img">${p.emoji}</div>
                    <h3>${p.name}</h3>
                    <p style="color: #64748b;">Premium ${p.cat}</p>
                    <div style="font-size: 1.2rem; font-weight: 800; margin: 10px 0;">$${p.price.toFixed(2)}</div>
                    <button class="btn-buy" onclick="addToCart()">Add to Cart</button>
                </div>
            `,
          )
          .join("");

        const adminTable = document.getElementById("admin-tbody");
        adminTable.innerHTML = products
          .map(
            (p) => `
                <tr>
                    <td>${p.emoji} <strong>${p.name}</strong></td>
                    <td>${p.cat}</td>
                    <td>$${p.price.toFixed(2)}</td>
                    <td><button onclick="handleDelete(${p.id})" style="color:red; border:none; background:none; cursor:pointer;">Delete</button></td>
                </tr>
            `,
          )
          .join("");

        document.getElementById("total-count").innerText = products.length;
        const total = products.reduce((acc, curr) => acc + curr.price, 0);
        document.getElementById("total-value").innerText =
          `$${total.toLocaleString()}`;
      }

      function handleCreate() {
        const name = document.getElementById("p-name").value;
        const emoji = document.getElementById("p-emoji").value || "📦";
        const price = parseFloat(document.getElementById("p-price").value);

        if (name && price) {
          products.push({ id: Date.now(), name, emoji, price, cat: "General" });
          render();
          document.getElementById("p-name").value = "";
          document.getElementById("p-price").value = "";
        }
      }

      function handleDelete(id) {
        products = products.filter((p) => p.id !== id);
        render();
      }

      function addToCart() {
        cart++;
        document.getElementById("cart-total").innerText = cart;
      }

      // Initialize
      render();
    </script>
  </body>
</html>
