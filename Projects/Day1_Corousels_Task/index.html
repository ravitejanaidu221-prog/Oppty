<!DOCTYPE html>
<html>
<head>
<title>Simple Carousel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#222;
}

.slider{
    width:80%;
    max-width:800px;
    text-align:center;
}


.slide img{
    width:100%;
    height:400px;
    object-fit:cover;
    border-radius:10px;
}

.buttons{
    margin-top:15px;
}

button{
    padding:10px 20px;
    margin:0 10px;
    font-size:16px;
    border:none;
    background:#444;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#666;
}
</style>
</head>

<body>

<div class="slider">
    <div class="slides">
        <div class="slide">
            <img id="slideImage" src="https://picsum.photos/id/1011/800/400">
        </div>
    </div>

    <div class="buttons">
        <button onclick="prevSlide()">Prev</button>
        <button onclick="nextSlide()">Next</button>
    </div>
</div>

<script>
const images = [
    "https://picsum.photos/id/1011/800/400",
    "https://picsum.photos/id/1015/800/400",
    "https://picsum.photos/id/1019/800/400",
    "https://picsum.photos/id/1020/800/400",
    "https://picsum.photos/id/1021/800/400"
];

let index = 0;
const slideImage = document.getElementById("slideImage");

function showSlide(){
    slideImage.src = images[index];
}

function nextSlide(){
    index++;
    if(index >= images.length){
        index = 0;
    } 
    showSlide();
}

function prevSlide(){
    index--;
    if(index < 0){
        index = images.length - 1;
    }
    showSlide();
}

setInterval(nextSlide, 3000);
</script>

</body>
</html>
